name: Build Remindly APK

on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup real Gradle wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -L "https://raw.githubusercontent.com/gradle/gradle/v8.7/gradlew" -o gradlew
          curl -L "https://raw.githubusercontent.com/gradle/gradle/v8.7/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          curl -L "https://raw.githubusercontent.com/gradle/gradle/v8.7/gradle/wrapper/gradle-wrapper.properties" \
            -o gradle/wrapper/gradle-wrapper.properties
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --info

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Remindly-APK
          path: app/build/outputs/apk/debug/app-debug.apk
